<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diário da princesa Luísa</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-soft: #ffdef2;
            --pink-strong: #ff4d94;
            --pink-medium: #ff85a1;
            --white: #ffffff;
            --shadow: rgba(255, 77, 148, 0.3);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, var(--pink-soft), var(--white), var(--pink-soft));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Montserrat', sans-serif;
            margin: 0; display: flex; flex-direction: column;
            align-items: center; height: 100vh; overflow: hidden; position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container-main {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; z-index: 10; padding: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            width: 100%; max-width: 420px;
            padding: 35px 25px; border-radius: 60px;
            border: 4px solid var(--pink-medium);
            box-shadow: 0 25px 50px var(--shadow);
            text-align: center; position: relative;
        }

        #saudacao {
            font-weight: 800;
            color: var(--pink-medium);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            display: block;
        }

        /* Estilos do Termômetro do Amor */
        #laco-container {
            position: relative;
            display: inline-block;
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }

        #laco-btn {
            font-size: 50px;
            display: inline-block;
            transition: transform 0.1s ease-out;
        }

        #love-counter {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--pink-strong);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 800;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #thought-bubble {
            position: absolute; top: -60px; right: -10px;
            background: var(--pink-strong); color: white;
            padding: 12px 22px; border-radius: 20px;
            font-size: 1rem; font-weight: 800;
            box-shadow: 0 5px 15px var(--shadow);
            display: none; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        h1 { color: var(--pink-strong); font-size: 2.4rem; margin: 10px 0; font-weight: 800; letter-spacing: -1px; }
        p { color: #d15d86; font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; line-height: 1.4; }

        .vibe-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .vibe-btn {
            background: var(--white); border: 2px solid var(--pink-soft);
            border-radius: 18px; padding: 10px 15px; cursor: pointer;
            font-size: 1.4rem; transition: 0.3s;
        }
        .vibe-btn:active { transform: scale(0.9); background: var(--pink-soft); }

        textarea {
            width: 100%; height: 150px; border: 3px solid var(--pink-soft);
            border-radius: 30px; padding: 20px; font-size: 1.2rem; font-weight: 500;
            font-family: 'Montserrat', sans-serif;
            outline: none; background: #fff; color: #a63d60; transition: 0.3s;
        }

        button#main-send {
            background: linear-gradient(45deg, var(--pink-medium), var(--pink-strong));
            color: white; border: none; padding: 22px;
            border-radius: 40px; font-size: 1.4rem; font-weight: 800;
            cursor: pointer; margin-top: 25px; width: 100%;
            box-shadow: 0 10px 20px var(--shadow);
            text-transform: uppercase;
        }

        .footer-luisa { width: 100%; height: 30vh; display: flex; justify-content: center; align-items: flex-end; z-index: 20; }
        #luisa-img { height: 115%; filter: drop-shadow(0 15px 35px rgba(0,0,0,0.2)); cursor: pointer; transition: 0.3s; pointer-events: auto; }
        #luisa-img:active { transform: scale(1.1); }

        .elemento-fofo {
            position: absolute;
            top: -50px;
            font-size: 24px;
            z-index: 1;
            pointer-events: none;
            animation: cairFofo linear forwards;
        }

        @keyframes cairFofo {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body onmousemove="trail(event)" ontouchmove="trail(event)">

    <div class="container-main">
        <div class="card">
            <div id="thought-bubble">Você é incrível! ✨</div>
            <span id="saudacao">...</span>
            
            <div id="laco-container" onmousedown="startLove()" onmouseup="stopLove()" ontouchstart="startLove()" ontouchend="stopLove()">
                <div id="love-counter">O Caetano te ama 0%</div>
                <span id="laco-btn">🎀</span>
            </div>

            <h1>Oi, meu amorzinho</h1>
            <p>Como a Princesinha Luisinha está se sentindo hoje?</p>
            
            <div class="vibe-selector">
                <button class="vibe-btn" onclick="playVibe('calm')">☁️</button>
                <button class="vibe-btn" onclick="playVibe('happy')">✨</button>
                <button class="vibe-btn" onclick="playVibe('love')">💖</button>
            </div>

            <textarea id="resposta" placeholder="Escreva aqui para o seu amor..."></textarea>
            <button id="main-send" onclick="enviarMensagem()">Enviar para o Caetano 💖</button>
        </div>
    </div>

    <div class="footer-luisa">
        <img id="luisa-img" src="luisa_princesa.png" onclick="showThought()">
    </div>

    <audio id="audio-vibe" loop></audio>

    <script>
        // Lógica do Termômetro do Amor
        let loveInterval;
        let lovePercent = 0;
        const lacoBtn = document.getElementById('laco-btn');
        const loveCounter = document.getElementById('love-counter');

        function startLove() {
            loveCounter.style.opacity = "1";
            loveInterval = setInterval(() => {
                if (lovePercent < 1000000) {
                    lovePercent += Math.floor(Math.random() * 5000) + 1000;
                    if(lovePercent > 1000000) lovePercent = 1000000;
                    
                    loveCounter.innerText = `O Caetano te ama ${lovePercent.toLocaleString()}%`;
                    
                    // Faz o laço crescer baseado no progresso
                    let scale = 1 + (lovePercent / 2000000); 
                    lacoBtn.style.transform = `scale(${scale})`;
                }
            }, 50);
        }

        function stopLove() {
            clearInterval(loveInterval);
            if(lovePercent >= 1000000) {
                chuvaDeCoracoes(); // Explosão extra se chegar no máximo
            }
            // Reset suave
            lovePercent = 0;
            lacoBtn.style.transform = "scale(1)";
            loveCounter.style.opacity = "0";
        }

        function atualizarSaudacao() {
            const agora = new Date();
            const portoAlegreTime = new Intl.DateTimeFormat('pt-BR', {
                timeZone: 'America/Sao_Paulo',
                hour: 'numeric',
                hour12: false
            }).format(agora);

            const hora = parseInt(portoAlegreTime);
            let saudacaoTxt = "";

            if (hora >= 5 && hora < 12) saudacaoTxt = "Bom dia, minha bonequinha ☀️";
            else if (hora >= 12 && hora < 18) saudacaoTxt = "Boa tarde, minha gatinha 🌸";
            else saudacaoTxt = "Boa noite, minha princesinha 🌙";

            document.getElementById('saudacao').innerText = saudacaoTxt;
        }
        atualizarSaudacao();

        const elogios = [
            "Você é meu solzinho! ☀️", "Amo seu sorriso! 😊", "Você é perfeita! ✨", 
            "Tô aqui com você! ❤️", "Minha princesinha! 👑", "Te amo muito muito muito! 🌌",
            "Você brilha muito amorzinho! 🌟", "Meu porto seguro ⚓"
        ];

        function showThought() {
            const bubble = document.getElementById('thought-bubble');
            bubble.innerText = elogios[Math.floor(Math.random() * elogios.length)];
            bubble.style.display = 'block';
            setTimeout(() => { bubble.style.display = 'none'; }, 3000);
        }

        function playVibe(type) {
            const audio = document.getElementById('audio-vibe');
            const links = {
                calm: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                happy: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                love: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
            };
            audio.src = links[type];
            audio.volume = 0.3;
            audio.play().catch(() => {});
        }

        function trail(e) {
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            if(!x || !y) return;
            const dot = document.createElement('div');
            dot.innerHTML = ['✨', '💖', '🌸'][Math.floor(Math.random()*3)];
            dot.style.position = 'absolute';
            dot.style.left = x + 'px'; dot.style.top = y + 'px';
            dot.style.pointerEvents = 'none'; dot.style.fontSize = '20px';
            dot.style.zIndex = '100';
            const anim = dot.animate([{ transform: 'translate(-50%, -50%) scale(1)', opacity: 1 }, { transform: `translate(${(Math.random()-0.5)*50}px, 50px) scale(0)`, opacity: 0 }], { duration: 800 });
            document.body.appendChild(dot);
            anim.onfinish = () => dot.remove();
        }

        function chuvaDeCoracoes() {
            for (let i = 0; i < 35; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = ['💖', '❤', '💕'][Math.floor(Math.random()*3)];
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.zIndex = '1000';
                heart.style.pointerEvents = 'none';
                const duration = Math.random() * 2000 + 1000;
                const anim = heart.animate([{ transform: 'translateY(0) rotate(0deg)', opacity: 1 }, { transform: `translateY(-110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }], { duration: duration, easing: 'ease-out' });
                document.body.appendChild(heart);
                anim.onfinish = () => heart.remove();
            }
        }

        function enviarMensagem() {
            const texto = document.getElementById('resposta').value;
            if (texto.trim() === "") return alert("Escreve algo para mim! 🌸");
            chuvaDeCoracoes();
            setTimeout(() => {
                const url = `https://api.whatsapp.com/send?phone=5566999572569&text=` + 
                    encodeURIComponent(`✨ *O Diário da Princesinha Luisinha* ✨\n\n*Humor de hoje:* ${texto}`);
                window.open(url, '_blank');
            }, 1000);
        }

        function criarElementoFofo() {
            const elemento = document.createElement('div');
            elemento.className = 'elemento-fofo';
            const tipos = ['🌸', '💖', '🌹', '✨', '🌷', '🌼', '❤'];
            elemento.innerText = tipos[Math.floor(Math.random() * tipos.length)];
            elemento.style.left = Math.random() * 100 + 'vw';
            elemento.style.fontSize = (Math.random() * 20 + 15) + 'px';
            elemento.style.animationDuration = (Math.random() * 4 + 4) + 's';
            elemento.style.opacity = Math.random() * 0.5 + 0.3;
            document.body.appendChild(elemento);
            setTimeout(() => { elemento.remove(); }, 8000);
        }
        setInterval(criarElementoFofo, 450);
    </script>
</body>
</html>
